name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  code-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@beta
        id: claude-review
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY_GITHUB_ACTIONS }}
          direct_prompt: |
            Review this pull request and do two things:

            1. **Summary** — Write a concise 2–4 sentence summary of what this PR does and why.

            2. **Review** — Evaluate the changes against the following criteria:
            - Correctness against the OMS SDK conventions in AGENTS.md
            - Security: no private key material in session storage, P-256 credential must remain non-extractable
            - No floating-point math for token amounts (use parseUnits/formatUnits)
            - Platform availability annotations (@available) on new public surfaces
            - Test coverage for new behavior
            - Paths with spaces are properly quoted in any shell examples

            Format your full response as:
            SUMMARY: <summary text>
            REVIEW: <review text>

      - name: Post review to Slack
        if: always()
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_REVIEW_CHANNEL_ID }}
        run: |
          PR_URL="${{ github.event.pull_request.html_url }}"
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_AUTHOR="${{ github.event.pull_request.user.login }}"
          REVIEW_OUTPUT="${{ steps.claude-review.outputs.response }}"

          curl -s -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"channel\": \"$SLACK_CHANNEL_ID\",
              \"blocks\": [
                {
                  \"type\": \"header\",
                  \"text\": { \"type\": \"plain_text\", \"text\": \"🔍 Claude PR Review\" }
                },
                {
                  \"type\": \"section\",
                  \"text\": {
                    \"type\": \"mrkdwn\",
                    \"text\": \"*<$PR_URL|$PR_TITLE>*\nby $PR_AUTHOR\"
                  }
                },
                {
                  \"type\": \"section\",
                  \"text\": {
                    \"type\": \"mrkdwn\",
                    \"text\": $(echo "$REVIEW_OUTPUT" | python3 -c \"import json,sys; print(json.dumps(sys.stdin.read()))\")
                  }
                }
              ]
            }"
