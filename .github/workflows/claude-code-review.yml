name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  code-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@beta
        id: claude-review
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY_GITHUB_ACTIONS }}
          direct_prompt: |
            Review this pull request and do two things:

            1. **Summary** — Write a concise 2–4 sentence summary of what this PR does and why.

            2. **Review** — Evaluate the changes against the following criteria:
            - Correctness against the OMS SDK conventions in AGENTS.md
            - Security: no private key material in session storage, P-256 credential must remain non-extractable
            - No floating-point math for token amounts (use parseUnits/formatUnits)
            - Platform availability annotations (@available) on new public surfaces
            - Test coverage for new behavior
            - Paths with spaces are properly quoted in any shell examples

            Format your full response as:
            SUMMARY: <summary text>
            REVIEW: <review text>

      - name: Post review to Slack
        if: always() && github.event.action == 'opened' && env.SLACK_BOT_TOKEN != '' && env.SLACK_CHANNEL_ID != ''
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_REVIEW_CHANNEL_ID }}
          SLACK_USER_TARIKAN: ${{ secrets.SLACK_USER_TARIKAN }}
          SLACK_USER_AGRUNING: ${{ secrets.SLACK_USER_AGRUNING }}
          REVIEW_OUTPUT: ${{ steps.claude-review.outputs.response || steps.claude-review.outputs.output || steps.claude-review.outputs.result || '_(No review output)_' }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          TITLE="${REPO_NAME} Pull Request #${PR_NUMBER} Ready for Review"
          CC="CC: <@${SLACK_USER_TARIKAN}> <@${SLACK_USER_AGRUNING}>"

          PAYLOAD=$(jq -n \
            --arg channel "$SLACK_CHANNEL_ID" \
            --arg title "$TITLE" \
            --arg pr_url "$PR_URL" \
            --arg pr_number "$PR_NUMBER" \
            --arg pr_title "$PR_TITLE" \
            --arg pr_author "$PR_AUTHOR" \
            --arg repo "$REPO_NAME" \
            --arg review "$REVIEW_OUTPUT" \
            --arg cc "$CC" \
            '{
              channel: $channel,
              blocks: [
                {
                  type: "header",
                  text: { type: "plain_text", text: $title }
                },
                {
                  type: "section",
                  fields: [
                    { type: "mrkdwn", text: ("*Repository:*\n" + $repo) },
                    { type: "mrkdwn", text: ("*PR:*\n<" + $pr_url + "|#" + $pr_number + " " + $pr_title + ">") },
                    { type: "mrkdwn", text: ("*Author:*\n" + $pr_author) }
                  ]
                },
                {
                  type: "section",
                  text: { type: "mrkdwn", text: $review }
                },
                { type: "divider" },
                {
                  type: "section",
                  text: { type: "mrkdwn", text: $cc }
                }
              ]
            }')

          curl -s -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
