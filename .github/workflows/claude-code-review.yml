name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  code-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY_GITHUB_ACTIONS }}
          model: "claude-opus-4-8"
          direct_prompt: |
            Review this pull request. Focus on:
            - Correctness against the OMS SDK conventions in AGENTS.md
            - Security: no private key material in session storage, P-256 credential must remain non-extractable
            - No floating-point math for token amounts (use parseUnits/formatUnits)
            - Platform availability annotations (@available) on new public surfaces
            - Test coverage for new behavior
            - Paths with spaces are properly quoted in any shell examples
