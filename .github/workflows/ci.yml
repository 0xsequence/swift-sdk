name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26.6 (Swift tools 6.3)
        run: sudo xcode-select -s /Applications/Xcode_26.6.app

      - name: Verify release
        run: scripts/verify-release.sh
